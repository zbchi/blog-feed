services:
  mongo:
    image: mongo:8
    container_name: blog-feed-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?必须设置 root 密码}
      MONGO_APP_USER: ${MONGO_APP_USER:-blogfeed}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?必须设置应用密码}
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet localhost:27017/test
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: blog-feed-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      MONGO_URI: mongodb://${MONGO_APP_USER:-blogfeed}:${MONGO_APP_PASSWORD:?必须设置应用密码}@mongo:27017/?authSource=admin
      DISABLE_STARTUP_UPDATE: "false"
    depends_on:
      mongo:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: blog-feed-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: blog-feed-certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: |
      sh -c '
        trap exit TERM
        while :; do
          certbot renew --quiet
          sleep 12h
        done
      '
    restart: unless-stopped

volumes:
  mongo-data:
  certbot-certs:
  certbot-www:
